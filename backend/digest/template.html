<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #F5F3EC; margin: 0; padding: 32px 16px; font-family: Georgia, 'Times New Roman', serif; color: #1c1b16; }
  .wrap { max-width: 620px; margin: 0 auto; }
  .masthead { border-bottom: 2px solid #1c1b16; padding-bottom: 12px; margin-bottom: 8px; }
  .masthead h1 { font-size: 26px; margin: 0; letter-spacing: -0.5px; }
  .masthead .meta { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: #6B6B32; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
  .lede { font-size: 15px; font-style: italic; color: #4a4638; margin: 14px 0 26px; }
  .entry { background: #FBFAF5; border: 1px solid #d8d4c4; border-radius: 4px; padding: 20px 22px; margin-bottom: 18px; }
  .entry .rank { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: #6B6B32; }
  .entry h2 { font-size: 20px; margin: 4px 0 2px; }
  .entry .subline { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: #6b675a; margin-bottom: 10px; }
  .entry .score { float: right; font-family: 'SF Mono', Menlo, monospace; font-size: 22px; color: #6B6B32; }
  .entry .thesis { font-size: 14.5px; line-height: 1.5; margin: 8px 0; }
  .tags { margin: 10px 0; }
  .tag { display: inline-block; border: 1px solid #b9b49e; border-radius: 3px; padding: 2px 8px; font-family: 'SF Mono', Menlo, monospace; font-size: 10.5px; margin: 0 6px 6px 0; color: #4a4638; }
  .context { font-size: 13px; color: #4a4638; margin: 8px 0; }
  .context strong { color: #6B6B32; }
  .whynow { font-size: 13px; margin: 8px 0; padding-left: 10px; border-left: 3px solid #6B6B32; }
  .links { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #d8d4c4; font-family: 'SF Mono', Menlo, monospace; font-size: 11.5px; }
  .links a { color: #6B6B32; text-decoration: none; margin-right: 14px; }
  .footer { font-family: 'SF Mono', Menlo, monospace; font-size: 10.5px; color: #8a8574; text-align: center; margin-top: 28px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Signal Scout</h1>
    <div class="meta">{{COUNT}} people you should know &middot; {{DATE}}</div>
  </div>
  <p class="lede">Every person below scored above threshold on independently sourced evidence, is not yet a known founder, and comes with a verified way to reach them.</p>
  {{ENTRIES}}
  <div class="footer">generated by signal scout &middot; every claim links to its source</div>
</div>
</body>
</html>
